<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PAUD Digital Smart Class</title>
<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  font-family:'Comic Sans MS', sans-serif;
}

.wrapper{
  text-align:center;
}

h1{
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3, 200px);
  gap:30px;
  justify-content:center;
}

.card{
  background:white;
  padding:20px;
  border-radius:25px;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.1);
}

.icon{
  font-size:70px;
  animation:float 2s infinite ease-in-out;
}

.card button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  font-size:18px;
  cursor:pointer;
  background:#ffd700;
  transition:0.3s;
}

.card button:hover{
  background:#ffa500;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

@media(max-width:900px){
  .grid{
    grid-template-columns:repeat(2, 180px);
  }
}

@media(max-width:600px){
  .grid{
    grid-template-columns:repeat(1, 180px);
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <h1>🎮 PAUD Digital Smart Class</h1>

  <div class="grid">

    <div class="card">
      <div class="icon">🐾</div>
      <button onclick="openGame('hewan.html')">Tebak Hewan</button>
    </div>

    <div class="card">
      <div class="icon">🔤</div>
      <button onclick="openGame('huruf.html')">Tebak Huruf</button>
    </div>

    <div class="card">
      <div class="icon">🔢</div>
      <button onclick="openGame('angka.html')">Tebak Angka</button>
    </div>

    <div class="card">
      <div class="icon">🎨</div>
      <button onclick="openGame('warna.html')">Tebak Warna</button>
    </div>

    <div class="card">
      <div class="icon">🔷</div>
      <button onclick="openGame('bentuk.html')">Tebak Bentuk</button>
    </div>

    <div class="card">
      <div class="icon">🧠</div>
      <button onclick="openGame('puzzle.html')">Puzzle Mini</button>
    </div>

  </div>
</div>

<!-- Musik latar -->
<audio id="bgMusic" loop>
  <source src="assets/sound/background.mp3" type="audio/mp3">
</audio>

<!-- Efek klik tombol -->
<audio id="clickSound" preload="auto">
  <source src="assets/sound/ring.mp3" type="audio/mp3">
</audio>

<script>
const bgMusic = document.getElementById("bgMusic");
const click = document.getElementById("clickSound");

function openGame(url){
  // mainkan efek klik
  click.currentTime = 0;
  click.play();

  // mulai musik latar jika belum berjalan
  if(bgMusic.paused){
    bgMusic.volume = 0.3; // volume nyaman untuk anak-anak
    bgMusic.play().catch(err=>{
      console.log("Autoplay gagal:", err);
    });
  }

  // buka halaman permainan setelah delay supaya suara terdengar
  setTimeout(()=>{
    window.location.href = url;
  }, 200);
}
</script>

</body>
</html>
