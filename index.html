<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAUD Digital Smart Class</title>

<style>

body{
margin:0;
font-family:'Comic Sans MS',sans-serif;
text-align:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

.wrapper{
text-align:center;
}

h1{
font-size:45px;
margin-bottom:10px;
}

.subtitle{
font-size:20px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,220px);
gap:30px;
justify-content:center;
}

.card{
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:scale(1.1);
}

.icon{
font-size:80px;
animation:float 2s infinite ease-in-out;
}

.card button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:20px;
font-size:18px;
cursor:pointer;
background:#ffd700;
}

.card button:hover{
background:#ffa500;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.teacher{
position:absolute;
left:20px;
bottom:20px;
font-size:80px;
animation:wave 2s infinite;
}

@keyframes wave{
0%{transform:rotate(0deg)}
50%{transform:rotate(10deg)}
100%{transform:rotate(0deg)}
}

.musicBtn{
position:absolute;
top:20px;
right:20px;
background:white;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.star{
font-size:22px;
margin-bottom:15px;
}

.creator{
position:fixed;
bottom:10px;
width:100%;
font-weight:bold;
}

.creator a{
color:#ff0066;
text-decoration:none;
}

@media(max-width:900px){
.grid{
grid-template-columns:repeat(2,200px);
}
}

@media(max-width:600px){
.grid{
grid-template-columns:repeat(1,200px);
}
}

</style>
</head>

<body>

<div class="musicBtn" onclick="toggleMusic()">🔊 Musik</div>

<div class="wrapper">

<h1>🎮 PAUD Digital Smart Class</h1>
<div class="subtitle">Belajar Sambil Bermain</div>

<div class="star" id="totalStar">⭐ 0</div>

<div class="grid">

<div class="card">
<div class="icon">🐾</div>
<button onclick="openGame('hewan.html')">Tebak Hewan</button>
</div>

<div class="card">
<div class="icon">🔤</div>
<button onclick="openGame('huruf.html')">Tebak Huruf</button>
</div>

<div class="card">
<div class="icon">🔢</div>
<button onclick="openGame('angka.html')">Tebak Angka</button>
</div>

<div class="card">
<div class="icon">🎨</div>
<button onclick="openGame('warna.html')">Tebak Warna</button>
</div>

<div class="card">
<div class="icon">🔷</div>
<button onclick="openGame('bentuk.html')">Tebak Bentuk</button>
</div>

<div class="card">
<div class="icon">🧩</div>
<button onclick="openGame('puzzle.html')">Puzzle Mini</button>
</div>

</div>

</div>

<div class="teacher">👩‍🏫</div>

<div class="creator">
Dibuat oleh 
<a href="https://wa.me/6283862505875" target="_blank">@SugengHidayat</a>
</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
<source src="assets/sound/latarmusik.mp3" type="audio/mpeg">
</audio>

<audio id="ringSound">
<source src="assets/sound/ring.mp3" type="audio/mpeg">
</audio>

<script>

const bgMusic=document.getElementById("bgMusic")
const ringSound=document.getElementById("ringSound")

function teacherGreeting(){

let text="Halo anak anak. Ayo kita belajar sambil bermain."

let speech=new SpeechSynthesisUtterance(text)

speech.lang="id-ID"
speech.pitch=1.2
speech.rate=0.9

speechSynthesis.speak(speech)

}

window.addEventListener("load",()=>{

showTotalScore()

setTimeout(teacherGreeting,1000)

let playPromise=bgMusic.play()

if(playPromise!==undefined){
playPromise.catch(()=>{
document.body.addEventListener("click",()=>{
bgMusic.play()
},{once:true})
})
}

})

function toggleMusic(){

if(bgMusic.paused){
bgMusic.play()
}else{
bgMusic.pause()
}

}

function openGame(url){

ringSound.play()

setTimeout(()=>{
window.location.href=url
},400)

}

function showTotalScore(){

let data=JSON.parse(localStorage.getItem("paud_score")) || {}

let total=0

for(let game in data){
total+=data[game]
}

document.getElementById("totalStar").innerHTML="⭐ Total Bintang : "+total

}

</script>

</body>
</html>
