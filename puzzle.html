<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Puzzle Hewan PRO</title>

<style>

body{
margin:0;
font-family:'Comic Sans MS',sans-serif;
text-align:center;
background:linear-gradient(#ffeaa7,#ffffff);
}

h1{
margin-top:20px;
font-size:40px;
}

#board{
margin:20px auto;
width:360px;
height:360px;
display:grid;
gap:2px;
border:4px solid #333;
}

.tile{
background-size:360px 360px;
border-radius:6px;
cursor:pointer;
}

.tile:hover{
opacity:0.9;
}

.controls{
margin-top:10px;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:15px;
margin:5px;
cursor:pointer;
background:#55efc4;
}

button:hover{
background:#00b894;
color:white;
}

#star{
font-size:25px;
margin-top:10px;
}

#win{
font-size:80px;
display:none;
animation:bounce 0.8s infinite alternate;
}

@keyframes bounce{
0%{transform:translateY(0)}
100%{transform:translateY(-25px)}
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh) rotate(720deg)}
}

</style>
</head>

<body>

<h1>🧩 Puzzle Hewan</h1>

<div id="star">⭐ 0</div>

<div class="controls">

<select id="level">
<option value="2">Level 1 (2x2)</option>
<option value="3" selected>Level 2 (3x3)</option>
<option value="4">Level 3 (4x4)</option>
<option value="5">Level 4 (5x5)</option>
</select>

<button onclick="startGame()">Puzzle Baru</button>

<button onclick="window.location.href='index.html'">
⬅ Menu
</button>

</div>

<div id="board"></div>

<div id="win">🎉</div>

<audio id="clap" src="assets/sound/clap.mp3"></audio>
<audio id="guru" src="assets/sound/guru.mp3"></audio>

<script>

const board=document.getElementById("board")

let size=3
let tiles=[]
let empty
let star=0

const images=[
"assets/img/puzzle1.jpg",
"assets/img/puzzle2.jpg",
"assets/img/puzzle3.jpg",
"assets/img/puzzle4.jpg",
"assets/img/puzzle5.jpg"
]

let currentImage=images[Math.floor(Math.random()*images.length)]

function startGame(){

size=parseInt(document.getElementById("level").value)

board.style.gridTemplateColumns=`repeat(${size},1fr)`
board.style.gridTemplateRows=`repeat(${size},1fr)`

tiles=[]

for(let i=0;i<size*size;i++){
tiles.push(i)
}

empty=tiles.length-1

shuffle()

render()

document.getElementById("win").style.display="none"

currentImage=images[Math.floor(Math.random()*images.length)]

}

function shuffle(){

for(let i=tiles.length-1;i>0;i--){

let j=Math.floor(Math.random()*i)

let temp=tiles[i]
tiles[i]=tiles[j]
tiles[j]=temp

}

empty=tiles.indexOf(tiles.length-1)

}

function render(){

board.innerHTML=""

tiles.forEach((tile,index)=>{

let div=document.createElement("div")

div.className="tile"

if(tile!=tiles.length-1){

let x=(tile%size)*(360/size)
let y=Math.floor(tile/size)*(360/size)

div.style.backgroundImage=`url(${currentImage})`
div.style.backgroundPosition=`-${x}px -${y}px`

}else{

div.style.background="white"

}

div.onclick=()=>move(index)

board.appendChild(div)

})

}

function move(index){

let valid=[
empty-1,
empty+1,
empty-size,
empty+size
]

if(valid.includes(index)){

[tiles[index],tiles[empty]]=[tiles[empty],tiles[index]]

empty=index

render()

checkWin()

}

}

function checkWin(){

for(let i=0;i<tiles.length;i++){
if(tiles[i]!=i)return
}

document.getElementById("win").style.display="block"

document.getElementById("clap").play()

setTimeout(()=>{
document.getElementById("guru").play()
},800)

confetti()

addStar()

}

function addStar(){

star++

document.getElementById("star").innerHTML="⭐ "+star

let data=JSON.parse(localStorage.getItem("paud_score")) || {}

data["puzzle"]=(data["puzzle"]||0)+1

localStorage.setItem("paud_score",JSON.stringify(data))

}

function confetti(){

for(let i=0;i<100;i++){

let c=document.createElement("div")

c.className="confetti"

c.style.left=Math.random()*100+"vw"

c.style.background=`hsl(${Math.random()*360},100%,50%)`

document.body.appendChild(c)

setTimeout(()=>c.remove(),3000)

}

}

startGame()

</script>

</body>
</html>
