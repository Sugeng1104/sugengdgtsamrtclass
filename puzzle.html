<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Puzzle Mini</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(#fff3cd,#ffffff);
}

h1{
margin-top:20px;
}

#board{
width:300px;
height:300px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
gap:5px;
border:4px solid #333;
}

.tile{
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
background:white;
cursor:pointer;
border-radius:10px;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
cursor:pointer;
margin-top:10px;
}

#animasi{
font-size:70px;
display:none;
}

</style>

</head>

<body>

<h1>🧩 Puzzle Mini</h1>

<div id="board"></div>

<div id="animasi">👏😊👏</div>

<button onclick="startGame()">Puzzle Baru</button>

<br><br>

<button onclick="window.location.href='index.html'">
⬅ Kembali ke Menu
</button>

<audio id="clap" src="assets/sound/clap.mp3"></audio>

<script>

const board=document.getElementById("board")

const icons=["🐱","🐶","🐼","🐯","🐸","🐵","🐰","🐻","🦁"]

let tiles=[]

function startGame(){

tiles=[...icons]

shuffle(tiles)

render()

document.getElementById("animasi").style.display="none"

}

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

[array[i],array[j]]=[array[j],array[i]]

}

}

function render(){

board.innerHTML=""

tiles.forEach((icon,index)=>{

let div=document.createElement("div")

div.className="tile"

div.innerHTML=icon

div.onclick=()=>move(index)

board.appendChild(div)

})

}

function move(index){

if(index<tiles.length-1){

[tiles[index],tiles[index+1]]=[tiles[index+1],tiles[index]]

render()

checkWin()

}

}

function checkWin(){

let win=true

for(let i=0;i<icons.length;i++){

if(tiles[i]!=icons[i]){

win=false
break

}

}

if(win){

document.getElementById("animasi").style.display="block"

document.getElementById("clap").play()

}

}

startGame()

</script>

</body>
</html>
