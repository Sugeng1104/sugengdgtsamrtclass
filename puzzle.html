<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Puzzle Hewan ULTRA</title>

<style>

body{
margin:0;
font-family:'Comic Sans MS',sans-serif;
text-align:center;
background:linear-gradient(#ffeaa7,#ffffff);
}

h1{
font-size:40px;
margin-top:20px;
}

#gameArea{
display:flex;
justify-content:center;
align-items:center;
gap:30px;
margin-top:20px;
flex-wrap:wrap;
}

#preview{
width:180px;
border:4px solid #333;
border-radius:10px;
}

#board{
width:360px;
height:360px;
display:grid;
gap:2px;
border:4px solid #333;
background:#ddd;
}

.tile{
border-radius:6px;
background-repeat:no-repeat;
cursor:grab;
}

.tile.correct{
box-shadow:0 0 10px #00ff00;
}

.controls{
margin-top:10px;
}

button,select{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:15px;
margin:5px;
cursor:pointer;
background:#55efc4;
}

button:hover{
background:#00b894;
color:white;
}

#star{
font-size:25px;
}

#win{
font-size:80px;
display:none;
animation:bounce 0.8s infinite alternate;
}

@keyframes bounce{
0%{transform:translateY(0)}
100%{transform:translateY(-25px)}
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh) rotate(720deg)}
}

</style>
</head>

<body>

<h1>🧩 Puzzle Hewan</h1>

<div id="star">⭐ 0</div>

<div class="controls">

<select id="level">
<option value="2">Level 1 (2x2)</option>
<option value="3" selected>Level 2 (3x3)</option>
<option value="4">Level 3 (4x4)</option>
<option value="5">Level 4 (5x5)</option>
</select>

<button onclick="startGame()">Puzzle Baru</button>

<button onclick="location.href='index.html'">⬅ Menu</button>

</div>

<div id="gameArea">

<img id="preview">

<div id="board"></div>

</div>

<div id="win">🎉</div>

<audio id="clap" src="assets/sound/clap.mp3"></audio>
<audio id="guru" src="assets/sound/guru.mp3"></audio>
<audio id="bg" src="assets/sound/misteri.mp3" loop></audio>

<script>

const board=document.getElementById("board")
const preview=document.getElementById("preview")
const bg=document.getElementById("bg")

bg.volume=0.25

let size=3
let tiles=[]
let star=0
let currentImage=""

const images=[
"assets/images/puzzle/puzzle1.png",
"assets/images/puzzle/puzzle2.png",
"assets/images/puzzle/puzzle3.png",
"assets/images/puzzle/puzzle4.png",
"assets/images/puzzle/puzzle5.png"
]

function startGame(){

size=parseInt(level.value)

board.style.gridTemplateColumns=`repeat(${size},1fr)`

tiles=[]

for(let i=0;i<size*size;i++){
tiles.push(i)
}

shuffle()

currentImage=images[Math.floor(Math.random()*images.length)]

preview.src=currentImage

render()

win.style.display="none"

}

function shuffle(){

for(let i=tiles.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let temp=tiles[i]
tiles[i]=tiles[j]
tiles[j]=temp

}

}

let dragIndex=null

function render(){

board.innerHTML=""

let tileSize=360/size

tiles.forEach((tile,index)=>{

let div=document.createElement("div")

div.className="tile"

div.style.width=tileSize+"px"
div.style.height=tileSize+"px"

if(tile!=tiles.length-1){

let x=(tile%size)*tileSize
let y=Math.floor(tile/size)*tileSize

div.style.backgroundImage=`url(${currentImage})`
div.style.backgroundSize="360px 360px"
div.style.backgroundPosition=`-${x}px -${y}px`

}

div.draggable=true

div.ondragstart=()=>dragIndex=index

div.ondragover=e=>e.preventDefault()

div.ondrop=()=>swap(index)

board.appendChild(div)

})

}

function swap(index){

[tiles[index],tiles[dragIndex]]=[tiles[dragIndex],tiles[index]]

render()

checkWin()

}

function checkWin(){

for(let i=0;i<tiles.length;i++){
if(tiles[i]!=i)return
}

win.style.display="block"

clap.play()

setTimeout(()=>{
guru.play()
},800)

confetti()

addStar()

}

function addStar(){

star++

starDiv.innerHTML="⭐ "+star

let data=JSON.parse(localStorage.getItem("paud_score"))||{}

data["puzzle"]=(data["puzzle"]||0)+1

localStorage.setItem("paud_score",JSON.stringify(data))

}

function confetti(){

for(let i=0;i<120;i++){

let c=document.createElement("div")

c.className="confetti"

c.style.left=Math.random()*100+"vw"

c.style.background=`hsl(${Math.random()*360},100%,50%)`

document.body.appendChild(c)

setTimeout(()=>c.remove(),3000)

}

}

window.addEventListener("click",()=>{

bg.play()

},{once:true})

startGame()

</script>

</body>
</html>
