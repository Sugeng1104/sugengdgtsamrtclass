<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Puzzle Hewan</title>

<style>

body{
margin:0;
font-family:'Comic Sans MS',sans-serif;
text-align:center;
background:linear-gradient(#fff3cd,#ffffff);
}

h1{
margin-top:20px;
}

#controls{
margin-top:10px;
}

select,button{
padding:10px 15px;
font-size:16px;
border-radius:10px;
border:none;
margin:5px;
cursor:pointer;
}

#board{
margin:20px auto;
display:grid;
gap:3px;
width:320px;
height:320px;
border:4px solid #333;
}

.tile{
background-size:320px 320px;
cursor:pointer;
border-radius:5px;
}

.tile:hover{
opacity:0.8;
}

#win{
font-size:60px;
display:none;
animation:bounce 0.8s infinite alternate;
}

@keyframes bounce{
0%{transform:translateY(0)}
100%{transform:translateY(-20px)}
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh) rotate(720deg)}
}

</style>
</head>

<body>

<h1>🧩 Puzzle Hewan</h1>

<div id="controls">

Level :

<select id="level">
<option value="2">Mudah (2x2)</option>
<option value="3" selected>Sedang (3x3)</option>
<option value="4">Sulit (4x4)</option>
</select>

<button onclick="startGame()">Puzzle Baru</button>

<button onclick="window.location.href='index.html'">
⬅ Menu
</button>

</div>

<div id="board"></div>

<div id="win">🎉👏</div>

<audio id="clap" src="assets/sound/clap.mp3"></audio>
<audio id="guru" src="assets/sound/guru.mp3"></audio>

<script>

const board=document.getElementById("board")

let size=3
let tiles=[]
let emptyIndex

const image="assets/img/puzzle-hewan.jpg"

function startGame(){

size=parseInt(document.getElementById("level").value)

board.style.gridTemplateColumns=`repeat(${size},1fr)`
board.style.gridTemplateRows=`repeat(${size},1fr)`

tiles=[]

for(let i=0;i<size*size;i++){

tiles.push(i)

}

emptyIndex=tiles.length-1

shuffle()

render()

document.getElementById("win").style.display="none"

}

function shuffle(){

for(let i=tiles.length-1;i>0;i--){

let j=Math.floor(Math.random()*i)

let temp=tiles[i]
tiles[i]=tiles[j]
tiles[j]=temp

}

emptyIndex=tiles.indexOf(tiles.length-1)

}

function render(){

board.innerHTML=""

tiles.forEach((tile,index)=>{

let div=document.createElement("div")

div.className="tile"

if(tile!=tiles.length-1){

let x=(tile%size)*(320/size)
let y=Math.floor(tile/size)*(320/size)

div.style.backgroundImage=`url(${image})`
div.style.backgroundPosition=`-${x}px -${y}px`

}else{

div.style.background="white"

}

div.onclick=()=>move(index)

board.appendChild(div)

})

}

function move(index){

let validMoves=[
emptyIndex-1,
emptyIndex+1,
emptyIndex-size,
emptyIndex+size
]

if(validMoves.includes(index)){

[tiles[index],tiles[emptyIndex]]=[tiles[emptyIndex],tiles[index]]

emptyIndex=index

render()

checkWin()

}

}

function checkWin(){

for(let i=0;i<tiles.length;i++){

if(tiles[i]!=i)return

}

document.getElementById("win").style.display="block"

document.getElementById("clap").play()

setTimeout(()=>{

document.getElementById("guru").play()

},800)

confetti()

}

function confetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div")

c.className="confetti"

c.style.left=Math.random()*100+"vw"

c.style.background=`hsl(${Math.random()*360},100%,50%)`

document.body.appendChild(c)

setTimeout(()=>c.remove(),3000)

}

}

startGame()

</script>

</body>
</html>
