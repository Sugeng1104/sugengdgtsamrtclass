<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tebak Huruf - PAUD Smart</title>

<style>
body{
  margin:0;
  font-family:'Comic Sans MS', sans-serif;
  text-align:center;
  background:linear-gradient(135deg,#f6d365,#fda085);
}

h1{
  margin-top:20px;
  font-size:40px;
  animation:bounce 2s infinite;
}

#score{
  font-size:22px;
}

.grid{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:40px;
  flex-wrap:wrap;
}

.card{
  background:white;
  padding:30px;
  border-radius:25px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
  font-size:60px;
  font-weight:bold;
}

.card:hover{
  transform:scale(1.2);
}

#result{
  font-size:32px;
  margin-top:20px;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  background:#00c3ff;
  cursor:pointer;
  margin-top:20px;
}

@keyframes bounce{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

.confetti{
  position:absolute;
  width:10px;
  height:10px;
  top:-10px;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{transform:translateY(100vh) rotate(720deg);}
}

.creator{
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:16px;
  font-weight:bold;
}

.creator a{
  color:#ff0066;
  text-decoration:none;
}
</style>
</head>
<body>

<h1>🔤 Tebak Huruf</h1>
<div id="score">Skor: 0</div>

<button onclick="playSound()">▶ Dengarkan Huruf</button>

<div class="grid" id="choices"></div>

<div id="result"></div>

<div class="creator">
  Dibuat oleh 
  <a href="https://wa.me/6283862505875" target="_blank">
    @SugengHidayat
  </a>
</div>

<script>

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let correct;
let score=0;

const clap=new Audio("https://actions.google.com/sounds/v1/crowds/applause.ogg");
const wrong=new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg");

function shuffle(array){
  return array.sort(()=>0.5-Math.random());
}

function loadGame(){
  document.getElementById("result").innerHTML="";
  let options=shuffle([...letters]).slice(0,3);
  correct=options[Math.floor(Math.random()*3)];

  let html="";
  options.forEach(letter=>{
    html+=`
      <div class="card" onclick="checkAnswer('${letter}')">
        ${letter}
      </div>
    `;
  });

  document.getElementById("choices").innerHTML=html;
}

function playSound(){
  let utterance = new SpeechSynthesisUtterance(correct);
  utterance.lang = "id-ID";
  speechSynthesis.speak(utterance);
}

function checkAnswer(answer){

  if(answer===correct){
    score++;
    clap.play();
    document.getElementById("result").innerHTML="🎉 Hebat!";
    createConfetti();
  }else{
    wrong.play();
    document.getElementById("result").innerHTML="❌ Coba Lagi";
  }

  document.getElementById("score").innerHTML="Skor: "+score;

  setTimeout(loadGame,1500);
}

function createConfetti(){
  for(let i=0;i<40;i++){
    let conf=document.createElement("div");
    conf.className="confetti";
    conf.style.left=Math.random()*100+"vw";
    conf.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(conf);
    setTimeout(()=>conf.remove(),3000);
  }
}

loadGame();

</script>

</body>
</html>
