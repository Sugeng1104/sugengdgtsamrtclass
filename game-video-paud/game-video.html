<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Video Gigi PAUD</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(#dff9fb,#ffffff);
margin:0;
}

h1{
margin-top:20px;
}

#tutorial{
font-size:22px;
margin:30px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:15px;
background:#6ab04c;
color:white;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

#playerContainer{
display:flex;
justify-content:center;
margin-top:20px;
}

#player iframe{
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

#pertanyaan{
display:none;
margin-top:20px;
}

.opsi{
width:120px;
margin:15px;
cursor:pointer;
transition:0.3s;
}

.opsi:hover{
transform:scale(1.1);
}

#hasil{
font-size:45px;
margin-top:20px;
display:none;
}

#score{
font-size:26px;
margin-top:10px;
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
}
}

</style>
</head>

<body>

<h1>🦷 Game Video Gigi</h1>

<div id="score">⭐ 0</div>

<div id="tutorial">

👋 Halo anak-anak!<br><br>

1️⃣ Tonton video dulu ya<br>
2️⃣ Video akan berhenti<br>
3️⃣ Pilih gambar yang benar<br><br>

<button onclick="mulai()">▶ Mulai Bermain</button>

</div>

<div id="playerContainer">
<div id="player"></div>
</div>

<div id="pertanyaan">

<h2 id="soal"></h2>

<div id="opsiArea"></div>

</div>

<div id="hasil"></div>

<audio id="benar" src="assets/sound/clap.mp3"></audio>
<audio id="salah" src="assets/sound/wrong.mp3"></audio>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player
let tahap=1
let score=0
let soalIndex=0

const soal=[

{
waktu:10,
tanya:"Apa yang dipakai untuk membersihkan gigi?",
jawab:"sikat",
opsi:[
{gambar:"assets/img/sikat.png",nilai:"sikat"},
{gambar:"assets/img/permen.png",nilai:"permen"},
{gambar:"assets/img/kentang.png",nilai:"kentang"}
]
},

{
waktu:25,
tanya:"Kapan kita sikat gigi?",
jawab:"pagi",
opsi:[
{gambar:"assets/img/pagi.png",nilai:"pagi"},
{gambar:"assets/img/tidur.png",nilai:"tidur"},
{gambar:"assets/img/main.png",nilai:"main"}
]
},

{
waktu:40,
tanya:"Apa yang bisa membuat gigi berlubang?",
jawab:"permen",
opsi:[
{gambar:"assets/img/permen.png",nilai:"permen"},
{gambar:"assets/img/wortel.png",nilai:"wortel"},
{gambar:"assets/img/susu.png",nilai:"susu"}
]
}

]

function onYouTubeIframeAPIReady(){

player=new YT.Player('player',{
height:'360',
width:'640',
videoId:'V_M-VjoGpLg',
playerVars:{rel:0},
events:{'onStateChange':stateChange}
})

}

function mulai(){

document.getElementById("tutorial").style.display="none"

player.playVideo()

setInterval(cekWaktu,500)

}

function stateChange(event){

if(event.data==YT.PlayerState.ENDED && tahap==1){

tahap=2

player.seekTo(0)

player.playVideo()

}

}

function cekWaktu(){

if(tahap==2){

let waktuVideo=player.getCurrentTime()

let target=soal[soalIndex].waktu

if(waktuVideo>target){

player.pauseVideo()

tampilkanSoal()

tahap=3

}

}

}

function tampilkanSoal(){

let data=soal[soalIndex]

document.getElementById("pertanyaan").style.display="block"

document.getElementById("soal").innerHTML=data.tanya

let area=document.getElementById("opsiArea")

area.innerHTML=""

data.opsi.forEach(o=>{

let img=document.createElement("img")

img.src=o.gambar

img.className="opsi"

img.onclick=()=>cek(o.nilai)

area.appendChild(img)

})

}

function cek(pilih){

let data=soal[soalIndex]

let hasil=document.getElementById("hasil")

if(pilih==data.jawab){

document.getElementById("benar").play()

hasil.innerHTML="🎉 Hebat!"

score++

document.getElementById("score").innerHTML="⭐ "+score

confetti()

soalIndex++

if(soalIndex<soal.length){

setTimeout(()=>{

hasil.style.display="none"

document.getElementById("pertanyaan").style.display="none"

player.playVideo()

tahap=2

},2000)

}
else{

hasil.innerHTML="🏆 Kamu Hebat!"

}

}
else{

document.getElementById("salah").play()

hasil.innerHTML="❌ Coba lagi"

}

hasil.style.display="block"

}

function confetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div")

c.className="confetti"

c.style.left=Math.random()*100+"vw"

c.style.background=`hsl(${Math.random()*360},100%,50%)`

document.body.appendChild(c)

setTimeout(()=>c.remove(),3000)

}

}

</script>

</body>
</html>
