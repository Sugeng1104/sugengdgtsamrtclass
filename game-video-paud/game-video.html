<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Video Gigi PAUD</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(#dff9fb,#ffffff);
margin:0;
}

h1{
margin-top:20px;
}

#tutorial{
font-size:22px;
margin:30px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:15px;
background:#6ab04c;
color:white;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

#player{
margin-top:20px;
display:none;
}

#pertanyaan{
display:none;
margin-top:20px;
}

.opsi{
width:120px;
margin:15px;
cursor:pointer;
transition:0.3s;
}

.opsi:hover{
transform:scale(1.1);
}

#hasil{
font-size:45px;
margin-top:20px;
display:none;
}

#score{
font-size:25px;
margin-top:10px;
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
}
}

</style>
</head>

<body>

<h1>🦷 Game Video Gigi</h1>

<div id="score">⭐ 0</div>

<div id="tutorial">

👋 Halo anak-anak!<br><br>

1️⃣ Tonton video dulu ya<br>
2️⃣ Nanti video diputar lagi<br>
3️⃣ Jika video berhenti, pilih gambar yang benar<br><br>

<button onclick="mulai()">▶ Mulai Bermain</button>

</div>


<div id="player"></div>


<div id="pertanyaan">

<h2>Apa yang dipakai untuk membersihkan gigi?</h2>

<img src="assets/img/sikat.png" class="opsi" onclick="cek('sikat')">

<img src="assets/img/permen.png" class="opsi" onclick="cek('permen')">

<img src="assets/img/kentang.png" class="opsi" onclick="cek('kentang')">

</div>


<div id="hasil"></div>


<audio id="benar" src="assets/sound/clap.mp3"></audio>
<audio id="salah" src="assets/sound/wrong.mp3"></audio>


<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player
let tahap=1
let score=0
let jawaban="sikat"

function onYouTubeIframeAPIReady(){

player=new YT.Player('player',{
height:'360',
width:'640',
videoId:'V_M-VjoGpLg',
playerVars:{
'rel':0
},
events:{
'onStateChange':onPlayerStateChange
}
})

}

function mulai(){

document.getElementById("tutorial").style.display="none"
document.getElementById("player").style.display="block"

player.playVideo()

setInterval(cekWaktu,500)

}

function onPlayerStateChange(event){

if(event.data==YT.PlayerState.ENDED && tahap==1){

tahap=2

player.seekTo(0)

player.playVideo()

}

}

function cekWaktu(){

if(tahap==2){

let waktu=player.getCurrentTime()

if(waktu>12){

player.pauseVideo()

document.getElementById("pertanyaan").style.display="block"

}

}

}

function cek(pilih){

let hasil=document.getElementById("hasil")

if(pilih==jawaban){

document.getElementById("benar").play()

hasil.innerHTML="🎉 Hebat!"

score++

document.getElementById("score").innerHTML="⭐ "+score

confetti()

}
else{

document.getElementById("salah").play()

hasil.innerHTML="❌ Coba lagi"

}

hasil.style.display="block"

}

function confetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div")

c.className="confetti"

c.style.left=Math.random()*100+"vw"

c.style.background=`hsl(${Math.random()*360},100%,50%)`

document.body.appendChild(c)

setTimeout(()=>c.remove(),3000)

}

}

</script>

</body>
</html>
