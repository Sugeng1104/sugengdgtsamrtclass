<body>

<script>

let player
let tahap = 1
let score = 0
let soalIndex = 0
let timer

const soal=[

{
waktu:40,
tanya:"Apa yang bisa membuat gigi berlubang?",
jawab:"permen",
opsi:[
{gambar:"assets/img/permen.png",nilai:"permen"},
{gambar:"assets/img/wortel.png",nilai:"wortel"},
{gambar:"assets/img/susu.png",nilai:"susu"}
]
},

{
waktu:84,
tanya:"Apa yang dipakai bersama sikat?",
jawab:"pasta",
opsi:[
{gambar:"assets/img/pasta.png",nilai:"pasta"},
{gambar:"assets/img/sabun.png",nilai:"sabun"},
{gambar:"assets/img/minyak.png",nilai:"minyak"}
]
},

{
waktu:100,
tanya:"Apa yang kita sikat?",
jawab:"gigi",
opsi:[
{gambar:"assets/img/gigi.png",nilai:"gigi"},
{gambar:"assets/img/telinga.png",nilai:"telinga"},
{gambar:"assets/img/hidung.png",nilai:"hidung"}
]
},

{
waktu:105,
tanya:"Apa yang dipakai untuk membersihkan gigi?",
jawab:"sikat",
opsi:[
{gambar:"assets/img/sikat.png",nilai:"sikat"},
{gambar:"assets/img/permen.png",nilai:"permen"},
{gambar:"assets/img/kentang.png",nilai:"kentang"}
]
},

{
waktu:148,
tanya:"Kapan kita sikat gigi?",
jawab:"pagi",
opsi:[
{gambar:"assets/img/pagi.png",nilai:"pagi"},
{gambar:"assets/img/tidur.png",nilai:"tidur"},
{gambar:"assets/img/main.png",nilai:"main"}
]
},

{
waktu:189,
tanya:"Apa yang membuat gigi rusak?",
jawab:"permen",
opsi:[
{gambar:"assets/img/permen.png",nilai:"permen"},
{gambar:"assets/img/sayur.png",nilai:"sayur"},
{gambar:"assets/img/buah.png",nilai:"buah"}
]
},

{
waktu:202,
tanya:"Apa yang membuat gigi kuat?",
jawab:"susu",
opsi:[
{gambar:"assets/img/permen.png",nilai:"permen"},
{gambar:"assets/img/wortel.png",nilai:"wortel"},
{gambar:"assets/img/susu.png",nilai:"susu"}
]
}

]

function onYouTubeIframeAPIReady(){

player=new YT.Player('player',{
height:'360',
width:'640',
videoId:'V_M-VjoGpLg',
playerVars:{rel:0},
events:{'onStateChange':stateChange}
})

}

function mulai(){

document.getElementById("tutorial").style.display="none"

player.playVideo()

timer=setInterval(cekWaktu,500)

}

function stateChange(event){

if(event.data==YT.PlayerState.ENDED && tahap==1){

tahap=2
player.seekTo(0)
player.playVideo()

}

}

function cekWaktu(){

if(tahap==2 && soalIndex < soal.length){

let waktuVideo=player.getCurrentTime()
let target=soal[soalIndex].waktu

if(waktuVideo>=target){

player.pauseVideo()
tampilkanSoal()
tahap=3

}

}

}

function tampilkanSoal(){

let data=soal[soalIndex]

document.getElementById("pertanyaan").style.display="block"
document.getElementById("soal").innerHTML=data.tanya

let area=document.getElementById("opsiArea")
area.innerHTML=""

data.opsi.forEach(o=>{

let img=document.createElement("img")

img.src=o.gambar
img.className="opsi"

img.onclick=()=>cek(o.nilai)

area.appendChild(img)

})

}

function cek(pilih){

let data=soal[soalIndex]
let hasil=document.getElementById("hasil")

hasil.style.display="block"

if(pilih==data.jawab){

document.getElementById("benar").play()

hasil.innerHTML="🎉 Hebat!"

score++

document.getElementById("score").innerHTML="⭐ "+score

confetti()

soalIndex++

if(soalIndex < soal.length){

setTimeout(()=>{

hasil.style.display="none"
document.getElementById("pertanyaan").style.display="none"

player.playVideo()
tahap=2

},2000)

}
else{

hasil.innerHTML="🏆 Kamu Hebat!"

}

}
else{

document.getElementById("salah").play()

hasil.innerHTML="❌ Coba lagi"

}

}

function confetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div")

c.className="confetti"

c.style.left=Math.random()*100+"vw"

c.style.background=`hsl(${Math.random()*360},100%,50%)`

document.body.appendChild(c)

setTimeout(()=>c.remove(),3000)

}

}

</script>
