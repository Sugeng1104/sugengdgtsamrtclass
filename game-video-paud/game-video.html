<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Video Gigi - PAUD ULTRA PRO</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(#d4f1ff,#ffffff);
margin:0;
padding:20px;
}

h1{
color:#333;
}

#videoBox{
display:flex;
justify-content:center;
margin:20px;
}

iframe{
width:720px;
height:405px;
border-radius:10px;
}

#soalBox{
display:none;
margin-top:20px;
}

.pilihan{
width:120px;
margin:10px;
cursor:pointer;
transition:0.3s;
}

.pilihan:hover{
transform:scale(1.15);
}

#score{
font-size:24px;
margin-top:20px;
}

#bintang{
font-size:30px;
color:gold;
}

#animasi{
font-size:80px;
display:none;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
cursor:pointer;
margin-top:15px;
}

</style>

</head>
<body>

<h1>🦷 Game Video Gigi Pintar</h1>

<div id="tutorial">
<h2>Cara Bermain</h2>

<p>
1️⃣ Tonton video sampai selesai<br>
2️⃣ Video akan diputar lagi<br>
3️⃣ Saat video berhenti, jawab pertanyaan<br>
4️⃣ Kumpulkan bintang ⭐
</p>

<button onclick="mulaiGame()">Mulai Game</button>
</div>


<div id="videoBox" style="display:none">
<iframe id="video"
src="https://www.youtube.com/embed/V_M-VjoGpLg?enablejsapi=1"
allow="autoplay"></iframe>
</div>

<div id="soalBox">

<h2 id="pertanyaan"></h2>

<div id="pilihanBox"></div>

</div>

<div id="score">Skor: 0</div>
<div id="bintang"></div>

<div id="animasi">🎉👏😄</div>

<audio id="benar" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3f4d9c7eaa.mp3"></audio>
<audio id="salah" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7b3caa0d7b.mp3"></audio>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player
let skor = 0
let soalIndex = 0
let playCount = 0

const waktuSoal=[8,16,25,34,43,52,60,70,80,90]

const soal=[

{
t:"Apa yang kita sikat?",
jawab:"gigi",
opsi:["gigi","telinga","hidung"]
},

{
t:"Apa yang dipakai untuk sikat gigi?",
jawab:"sikat",
opsi:["sendok","sikat","pensil"]
},

{
t:"Kapan kita sikat gigi?",
jawab:"pagi",
opsi:["pagi","malam","siang"]
},

{
t:"Apa yang dipakai bersama sikat?",
jawab:"pasta",
opsi:["pasta","sabun","minyak"]
},

{
t:"Apa yang membuat gigi kuat?",
jawab:"susu",
opsi:["susu","coklat","permen"]
},

{
t:"Apa yang membuat gigi rusak?",
jawab:"permen",
opsi:["permen","sayur","buah"]
},

{
t:"Gigi dipakai untuk?",
jawab:"mengunyah",
opsi:["mengunyah","berlari","tidur"]
},

{
t:"Kalau sakit gigi pergi ke?",
jawab:"dokter",
opsi:["dokter","guru","pilot"]
},

{
t:"Berapa kali sikat gigi?",
jawab:"dua",
opsi:["satu","dua","lima"]
},

{
t:"Setelah makan harus?",
jawab:"sikat",
opsi:["tidur","sikat","lari"]
}

]


function onYouTubeIframeAPIReady(){

player = new YT.Player('video',{

events:{
'onReady':onPlayerReady,
'onStateChange':onPlayerStateChange
}

})

}


function onPlayerReady(){}


function mulaiGame(){

document.getElementById("tutorial").style.display="none"
document.getElementById("videoBox").style.display="block"

player.playVideo()

cekWaktu()

}


function cekWaktu(){

setInterval(function(){

if(player.getPlayerState()==1){

let time = Math.floor(player.getCurrentTime())

if(waktuSoal.includes(time)){

player.pauseVideo()
tampilkanSoal()

}

}

},1000)

}


function tampilkanSoal(){

if(soalIndex>=soal.length){

player.playVideo()
return
}

document.getElementById("soalBox").style.display="block"

let s=soal[soalIndex]

document.getElementById("pertanyaan").innerHTML=s.t

let html=""

s.opsi.forEach(function(p){

html+=`
<img src="https://dummyimage.com/120x120/ffffff/000000&text=${p}"
class="pilihan"
onclick="jawab('${p}')">
`

})

document.getElementById("pilihanBox").innerHTML=html

}


function jawab(p){

let benar=soal[soalIndex].jawab

if(p==benar){

skor++
document.getElementById("benar").play()
document.getElementById("animasi").style.display="block"

setTimeout(()=>{
document.getElementById("animasi").style.display="none"
},1500)

}

else{

document.getElementById("salah").play()

}

document.getElementById("score").innerHTML="Skor: "+skor
document.getElementById("bintang").innerHTML="⭐".repeat(skor)

soalIndex++

document.getElementById("soalBox").style.display="none"

player.playVideo()

}


function onPlayerStateChange(event){

if(event.data==0){

playCount++

if(playCount==1){

player.seekTo(0)
player.playVideo()

}

else{

document.getElementById("animasi").style.display="block"
document.getElementById("animasi").innerHTML="🏆 Hebat! Game Selesai!"

}

}

}

</script>

</body>
</html>
