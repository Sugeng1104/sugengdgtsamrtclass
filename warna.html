<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Warna</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(#a8e6ff,#ffffff);
}

h1{
color:#333;
}

#instruksi{
font-size:28px;
margin:20px;
}

.warna-container{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-top:30px;
}

.warna{
width:120px;
height:120px;
border-radius:20px;
cursor:pointer;
border:5px solid white;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
transition:transform 0.2s;
}

.warna:hover{
transform:scale(1.1);
}

#score{
font-size:24px;
margin-top:20px;
}

#animasi{
font-size:80px;
display:none;
margin-top:20px;
}

button{
padding:12px 20px;
font-size:18px;
margin-top:25px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🎨 Game Tebak Warna</h1>

<div id="instruksi">Pilih warna yang disebutkan!</div>

<div class="warna-container">

<div class="warna" style="background:red" onclick="cekJawaban('merah')"></div>
<div class="warna" style="background:blue" onclick="cekJawaban('biru')"></div>
<div class="warna" style="background:yellow" onclick="cekJawaban('kuning')"></div>
<div class="warna" style="background:green" onclick="cekJawaban('hijau')"></div>
<div class="warna" style="background:orange" onclick="cekJawaban('orange')"></div>
<div class="warna" style="background:purple" onclick="cekJawaban('ungu')"></div>

</div>

<div id="animasi">👏😊👏</div>

<div id="score">Skor: 0</div>

<button onclick="loadGame()">Soal Baru</button>
<br><br>

<button onclick="window.location.href='index.html'">⬅ Kembali ke Menu</button>

<audio id="benar" src="assets/sound/clap.mp3"></audio>
<audio id="salah" src="assets/sound/wrong.mp3"></audio>
<audio id="guru" src="assets/sound/guru.mp3"></audio>
<audio id="musik" src="assets/sound/latar musik.mp3" loop></audio>

<script>

const warnaList = [
"merah",
"biru",
"kuning",
"hijau",
"orange",
"ungu"
]

let jawaban = ""
let score = 0

function loadGame(){

document.getElementById("animasi").style.display="none"

jawaban = warnaList[Math.floor(Math.random()*warnaList.length)]

document.getElementById("instruksi").innerHTML =
"🎧 Pilih warna <b>"+jawaban.toUpperCase()+"</b>"

suaraGuru()

}

function cekJawaban(pilih){

if(pilih == jawaban){

score++
document.getElementById("score").innerHTML="Skor: "+score

document.getElementById("benar").play()

document.getElementById("animasi").style.display="block"

setTimeout(loadGame,1500)

}

else{

document.getElementById("salah").play()

}

}

function suaraGuru(){

let guru = document.getElementById("guru")
guru.currentTime = 0
guru.play()

}

window.onload=function(){

let musik=document.getElementById("musik")
musik.volume=0.2
musik.play()

loadGame()

}

</script>

</body>
</html>
