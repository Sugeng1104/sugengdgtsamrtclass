<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Tebak Hewan</title>

<style>
body{
  margin:0;
  font-family:'Comic Sans MS', sans-serif;
  text-align:center;
  background:linear-gradient(135deg,#84fab0,#8fd3f4);
}

h1{
  margin-top:20px;
  font-size:40px;
  animation:bounce 2s infinite;
}

#score{
  font-size:22px;
  margin-bottom:10px;
}

#question{
  font-size:28px;
  margin:20px;
}

.grid{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.card{
  background:white;
  padding:25px;
  border-radius:25px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card:hover{
  transform:scale(1.1);
}

.emoji{
  font-size:80px;
}

#result{
  font-size:30px;
  margin:20px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  font-size:18px;
  cursor:pointer;
  background:#ffd700;
  cursor:pointer;
}

@keyframes bounce{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}
</style>

</head>
<body>

<h1>🐾 Tebak Suara Hewan</h1>
<div id="score">Skor: 0</div>
<div id="question"></div>

<div class="grid" id="choices"></div>

<div id="result"></div>
<button onclick="nextQuestion()">Soal Berikutnya</button>

<script>

const animals=[
  {
    name:"Kucing",
    emoji:"🐱",
    sound:"https://actions.google.com/sounds/v1/animals/cat_meow.ogg"
  },
  {
    name:"Sapi",
    emoji:"🐮",
    sound:"https://actions.google.com/sounds/v1/animals/cow.ogg"
  },
  {
    name:"Ayam",
    emoji:"🐔",
    sound:"https://actions.google.com/sounds/v1/animals/chicken_cluck.ogg"
  },
  {
    name:"Gajah",
    emoji:"🐘",
    sound:"https://actions.google.com/sounds/v1/animals/elephant.ogg"
  },
  {
    name:"Singa",
    emoji:"🦁",
    sound:"https://actions.google.com/sounds/v1/animals/lion_roar.ogg"
  },
  {
    name:"Ikan",
    emoji:"🐟",
    sound:null // ikan tidak ada suara
  }
];

let correct;
let score=0;

function shuffle(array){
  return array.sort(()=>0.5-Math.random());
}

function loadQuestion(){
  document.getElementById("result").innerHTML="";
  let options=shuffle([...animals]).slice(0,3);
  correct=options[Math.floor(Math.random()*3)];

  document.getElementById("question").innerHTML=
    "Manakah yang berbunyi seperti "+correct.name+" ?";

  let html="";
  options.forEach(animal=>{
    html+=`
      <div class="card" onclick="checkAnswer('${animal.name}')">
        <div class="emoji">${animal.emoji}</div>
        <div>${animal.name}</div>
      </div>
    `;
  });

  document.getElementById("choices").innerHTML=html;

  // putar suara hewan yang benar sebagai petunjuk
  if(correct.sound){
    let audio=new Audio(correct.sound);
    audio.play();
  }
}

function checkAnswer(answer){
  let selected=animals.find(a=>a.name===answer);

  // suara hewan saat diklik
  if(selected.sound){
    let sound=new Audio(selected.sound);
    sound.play();
  }

  if(answer===correct.name){
    score++;
    document.getElementById("result").innerHTML="🎉 Hebat! Jawaban Benar!";
  }else{
    document.getElementById("result").innerHTML="❌ Coba Lagi Ya!";
  }

  document.getElementById("score").innerHTML="Skor: "+score;
}

function nextQuestion(){
  loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
