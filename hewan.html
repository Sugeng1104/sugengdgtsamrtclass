<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tebak Suara Hewan - PAUD 2.0</title>

<style>
body{
  margin:0;
  font-family:'Comic Sans MS', sans-serif;
  text-align:center;
  background:linear-gradient(135deg,#84fab0,#8fd3f4);
  overflow:hidden;
}

h1{
  margin-top:20px;
  font-size:40px;
  animation:bounce 2s infinite;
}

#score{
  font-size:22px;
}

.grid{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:40px;
  flex-wrap:wrap;
}

.card{
  background:white;
  padding:25px;
  border-radius:25px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card:hover{
  transform:scale(1.15);
}

.emoji{
  font-size:90px;
}

#result{
  font-size:32px;
  margin-top:20px;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  background:#ffd700;
  cursor:pointer;
  margin-top:20px;
}

@keyframes bounce{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

.confetti{
  position:absolute;
  width:10px;
  height:10px;
  background:red;
  top:-10px;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{transform:translateY(100vh) rotate(720deg);}
}
</style>
</head>
<body>

<h1>🔊 Tebak Suara Hewan</h1>
<div id="score">Skor: 0</div>

<button onclick="playSound()">▶ Dengarkan Suara</button>

<div class="grid" id="choices"></div>

<div id="result"></div>

<script>

const animals=[
  {name:"Kucing",emoji:"🐱",sound:"https://actions.google.com/sounds/v1/animals/cat_meow.ogg"},
  {name:"Sapi",emoji:"🐮",sound:"https://actions.google.com/sounds/v1/animals/cow.ogg"},
  {name:"Ayam",emoji:"🐔",sound:"https://actions.google.com/sounds/v1/animals/chicken_cluck.ogg"},
  {name:"Gajah",emoji:"🐘",sound:"https://actions.google.com/sounds/v1/animals/elephant.ogg"},
  {name:"Singa",emoji:"🦁",sound:"https://actions.google.com/sounds/v1/animals/lion_roar.ogg"}
];

let correct;
let score=0;

const clap=new Audio("https://actions.google.com/sounds/v1/crowds/applause.ogg");
const wrong=new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg");

function shuffle(array){
  return array.sort(()=>0.5-Math.random());
}

function loadGame(){
  document.getElementById("result").innerHTML="";
  let options=shuffle([...animals]).slice(0,3);
  correct=options[Math.floor(Math.random()*3)];

  let html="";
  options.forEach(animal=>{
    html+=`
      <div class="card" onclick="checkAnswer('${animal.name}')">
        <div class="emoji">${animal.emoji}</div>
      </div>
    `;
  });

  document.getElementById("choices").innerHTML=html;
}

function playSound(){
  let audio=new Audio(correct.sound);
  audio.play();
}

function checkAnswer(answer){

  let selected=animals.find(a=>a.name===answer);

  // suara hewan saat diklik
  let sound=new Audio(selected.sound);
  sound.play();

  if(answer===correct.name){
    score++;
    clap.play();
    document.getElementById("result").innerHTML="🎉 Hebat!";
    createConfetti();
  }else{
    wrong.play();
    document.getElementById("result").innerHTML="❌ Coba Lagi";
  }

  document.getElementById("score").innerHTML="Skor: "+score;

  setTimeout(loadGame,1500);
}

function createConfetti(){
  for(let i=0;i<40;i++){
    let conf=document.createElement("div");
    conf.className="confetti";
    conf.style.left=Math.random()*100+"vw";
    conf.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(conf);
    setTimeout(()=>conf.remove(),3000);
  }
}

loadGame();

</script>

</body>
</html>
