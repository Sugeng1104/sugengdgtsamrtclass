<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<button onclick="window.location.href='index.html'">🏠 Menu Utama</button>
<title>Tebak Suara Hewan - PAUD 2.1</title>

<style>
body{
  margin:0;
  font-family:'Comic Sans MS', sans-serif;
  text-align:center;
  background:linear-gradient(135deg,#84fab0,#8fd3f4);
  overflow:hidden;
}

h1{
  margin-top:20px;
  font-size:40px;
  animation:bounce 2s infinite;
}

#score{ font-size:22px; }

.grid{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:40px;
  flex-wrap:wrap;
}

.card{
  background:white;
  padding:25px;
  border-radius:25px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card:hover{ transform:scale(1.15); }

.emoji{ font-size:90px; }

#result{
  font-size:32px;
  margin-top:20px;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-size:18px;
  background:#ffd700;
  cursor:pointer;
  margin-top:20px;
}

@keyframes bounce{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

.confetti{
  position:absolute;
  width:10px;
  height:10px;
  top:-10px;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{transform:translateY(100vh) rotate(720deg);}
}

  .creator{
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:16px;
  font-weight:bold;
}

.creator a{
  color:#ff0066;
  text-decoration:none;
  transition:0.3s;
}

.creator a:hover{
  color:#000;
  transform:scale(1.1);
}
</style>
</head>
<body>

<h1>🔊 Tebak Suara Hewan</h1>
<div id="score">Skor: 0</div>

<button onclick="playSound()">▶ Dengarkan Suara</button>

<div class="grid" id="choices"></div>
<div id="result"></div>

<script>

// 🔓 AUDIO UNLOCK (WAJIB UNTUK CHROME)
let audioUnlocked = false;
document.body.addEventListener("click", function(){
  if(!audioUnlocked){
    const context = new (window.AudioContext || window.webkitAudioContext)();
    context.resume();
    audioUnlocked = true;
  }
});

// 🎵 PASTIKAN NAMA FILE SAMA PERSIS DI GITHUB (huruf besar kecil sama)
const animals=[
  {name:"Kucing",emoji:"🐱",sound:"assets/sound/kucing.mp3"},
  {name:"Sapi",emoji:"🐮",sound:"assets/sound/sapi.mp3"},
  {name:"Ayam",emoji:"🐔",sound:"assets/sound/ayam.mp3"},
  {name:"Gajah",emoji:"🐘",sound:"assets/sound/gajah.mp3"},
  {name:"Singa",emoji:"🦁",sound:"assets/sound/singa.mp3"}
];

let correct;
let score=0;

// preload audio supaya tidak delay
animals.forEach(a=>{
  a.audio = new Audio(a.sound);
  a.audio.preload="auto";
});

const clap = new Audio("assets/sound/clap.mp3");
const wrong = new Audio("assets/sound/wrong.mp3");

function shuffle(array){
  return array.sort(()=>0.5-Math.random());
}

function loadGame(){
  document.getElementById("result").innerHTML="";
  let options=shuffle([...animals]).slice(0,3);
  correct=options[Math.floor(Math.random()*3)];

  let html="";
  options.forEach(animal=>{
    html+=`
      <div class="card" onclick="checkAnswer('${animal.name}')">
        <div class="emoji">${animal.emoji}</div>
      </div>
    `;
  });

  document.getElementById("choices").innerHTML=html;
}

function playSound(){
  correct.audio.currentTime = 0;
  correct.audio.play().catch(e=>console.log(e));
}

function checkAnswer(answer){

  let selected=animals.find(a=>a.name===answer);

  selected.audio.currentTime=0;
  selected.audio.play().catch(e=>console.log(e));

  if(answer===correct.name){
    score++;
    clap.play();
    document.getElementById("result").innerHTML="🎉 Hebat!";
    createConfetti();
  }else{
    wrong.play();
    document.getElementById("result").innerHTML="❌ Coba Lagi";
  }

  document.getElementById("score").innerHTML="Skor: "+score;

  setTimeout(loadGame,1500);
}

function createConfetti(){
  for(let i=0;i<40;i++){
    let conf=document.createElement("div");
    conf.className="confetti";
    conf.style.left=Math.random()*100+"vw";
    conf.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(conf);
    setTimeout(()=>conf.remove(),3000);
  }
}

loadGame();

</script>

  <div class="creator">
  Dibuat oleh 
  <a href="https://wa.me/6283862505875" target="_blank">
    @SugengHidayat
  </a>
</div>

</body>
</html>
